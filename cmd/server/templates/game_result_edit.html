{{define "game_result_edit"}}
<!DOCTYPE html>
<html lang="en">
<head>{{template "head" .}}</head>
<body>
  {{template "nav" .}}
  <main>
    <h1>Edit Game Result</h1>

    {{if .Error}}
    <p style="color: red; margin-bottom: 1rem;">{{.Error}}</p>
    {{end}}

    <form method="POST" action="/game-results/{{.Detail.ResultID}}/edit" class="form-narrow">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

      <label for="season_id">Season</label>
      <select id="season_id" name="season_id" required>
        <option value="">— select —</option>
        {{template "season-options" .}}
      </select>

      <label for="game_number">Game #</label>
      <input id="game_number" name="game_number" type="number" min="1" step="1" required
             value="{{.GameNumber}}">

      <label for="game_title">Game</label>
      <input id="game_title" name="game_title" list="games-list" type="text" required
             value="{{.GameTitle}}">
      <datalist id="games-list">
        {{range .Games}}<option value="{{.Title}}">{{end}}
      </datalist>

      <fieldset style="margin-top: 1.5rem; border: 1px solid #ccc; border-radius: 4px; padding: 1rem;">
        <legend>Placements</legend>
        {{range .Detail.Placements}}
        <div style="display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem;">
          <label style="min-width: 120px; font-weight: normal;">{{.PlayerName}}</label>
          <input type="number" name="place_{{.PlayerID}}" min="1" step="1" required
                 value="{{index $.Placements .PlayerID}}"
                 style="width: 100px;">
        </div>
        {{end}}
      </fieldset>

      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <button type="submit" class="btn-primary">Save</button>
        <a href="/game-results/{{.Detail.ResultID}}">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>
{{end}}
