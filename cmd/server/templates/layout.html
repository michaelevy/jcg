{{define "head"}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} – Jacksonian Gaming Council</title>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
        integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
        crossorigin="anonymous"></script>
<link rel="stylesheet" href="/static/style.css">
{{if .CSRFToken}}<meta name="csrf-token" content="{{.CSRFToken}}">
<script>
  document.addEventListener('htmx:configRequest', function(evt) {
    if (evt.detail.verb === 'get') return;
    var meta = document.querySelector('meta[name="csrf-token"]');
    if (meta) {
      evt.detail.headers['X-CSRF-Token'] = meta.getAttribute('content');
    }
  });
</script>
{{end}}{{end}}

{{define "nav"}}
<nav>
  <a href="/" class="brand">Jacksonian Gaming Council</a>
  <div class="nav-links">
    {{if .Username}}
      <span class="nav-user">{{.Username}}</span>
      <form method="POST" action="/logout" style="display:inline">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <button type="submit" class="btn-link">Logout</button>
      </form>
    {{else}}
      <a href="/login">Login</a>
    {{end}}
  </div>
</nav>
{{end}}
